version: '3.8'

services:
  sba-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sba-db
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    volumes:
      - mssql_data:/var/opt/mssql
      - ./init-db.sql:/init-db.sql
      - ./SBA301_SU26_GroupProject/src/main/resources/data/schema.sql:/schema.sql
      - ./SBA301_SU26_GroupProject/src/main/resources/data/insert_data.sql:/insert_data.sql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - sba-network

  db-web-gui:
    image: dbgate/dbgate
    container_name: db-web-gui
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - sba-network

  sba-redis:
    image: redis:7.2-alpine
    container_name: sba-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sba-network

  sba-backend:
    build:
      context: ./SBA301_SU26_GroupProject
      dockerfile: Dockerfile
    image: hohuy1405/sba-backend:latest
    container_name: sba-backend
    ports:
      - "8080:8080"
    depends_on:
      sba-db:
        condition: service_healthy
      sba-redis:
        condition: service_started
    environment:
      - DB_HOST=sba-db
      - DB_PORT=1433
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SPRING_PROFILES_ACTIVE=mssql
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - sba-network

  sba-frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: hohuy1405/sba-frontend:latest
    container_name: sba-frontend
    ports:
      - "80:80"
    depends_on:
      - sba-backend
    restart: unless-stopped
    networks:
      - sba-network

volumes:
  mssql_data:
  redis_data:

networks:
  sba-network:
    driver: bridge
